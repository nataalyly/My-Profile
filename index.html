<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Nathaly Angelica Wijaya</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            text-align: center;
            width: 100%;
            max-width: 380px;
            animation: fadeIn 1s ease-in-out;
        }

        .section-title {
            margin-top: 25px;
            margin-bottom: 10px;
            font-size: 1.1rem;
            color: #444;
        }

        .projects p {
            background: #f3f3f3;
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }

        .projects p:hover {
            transform: scale(1.03);
            transition: 0.2s;
        }

        .profile-img {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 5px;
            line-height: 1.3;
        }

        p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Styling Button (Pill Shape) */
        .btn {
            display: block;
            width: 100%;
            padding: 12px 0;
            margin-bottom: 15px;
            text-decoration: none;
            color: white;
            border-radius: 50px;
            font-weight: 500;
            transition: transform 0.2s, opacity 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-instagram { 
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); 
        }
        
        .btn-github { 
            background-color: #333333; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
    
<body>
    <div class="card">
        <img src="pfp.jpg" alt="Nathaly Angelica Wijaya" class="profile-img">

        <h1>Nathaly Angelica Wijaya</h1>
        <p>Computer Science Student<br>Future Game Developer 🚀<br>BINUS University @Malang</p>

        <a href="https://instagram.com/nataa.lyly" target="_blank" class="btn btn-instagram">
            Instagram
        </a>
        <a href="https://github.com/nataalyly" target="_blank" class="btn btn-github">
            GitHub
        </a>

        <!-- PROJECTS -->
        <h2 class="section-title">My Projects</h2>
        <div class="projects">
            <p>✨ BNCC Landing Page</p>
            <p>🎮 Unity 2D Game (in progress)</p>
        </div>

        <!-- CONTACT -->
        <h2 class="section-title">Contact</h2>
        <p>Email: nathalyangelica41@gmail.com</p>
    </div>

</body>
</html>
